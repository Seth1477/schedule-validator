<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="hexGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6b5fd4"/>
      <stop offset="100%" stop-color="#3d2fa3"/>
    </radialGradient>
    <!-- clip to hexagon -->
    <clipPath id="hexClip">
      <polygon points="100,8 185,52 185,148 100,192 15,148 15,52"/>
    </clipPath>
  </defs>

  <!-- Hexagon body -->
  <polygon points="100,8 185,52 185,148 100,192 15,148 15,52"
           fill="url(#hexGrad)"/>

  <!-- Dashed border -->
  <polygon points="100,8 185,52 185,148 100,192 15,148 15,52"
           fill="none"
           stroke="rgba(255,255,255,0.28)"
           stroke-width="3"
           stroke-dasharray="7 5"/>

  <!-- Subtle inner highlight -->
  <polygon points="100,16 177,56 177,144 100,184 23,144 23,56"
           fill="none"
           stroke="rgba(255,255,255,0.08)"
           stroke-width="1.5"/>

  <!-- Speed lines (right of CC) -->
  <g clip-path="url(#hexClip)" opacity="0.35">
    <rect x="108" y="62" width="62" height="9" rx="4.5" fill="#c4b5fd"/>
    <rect x="108" y="80" width="52" height="9" rx="4.5" fill="#c4b5fd"/>
    <rect x="108" y="98" width="58" height="9" rx="4.5" fill="#c4b5fd"/>
    <rect x="108" y="116" width="44" height="9" rx="4.5" fill="#c4b5fd"/>
  </g>

  <!-- Large C -->
  <text x="42" y="118"
        font-family="'Arial Rounded MT Bold', 'Arial Black', sans-serif"
        font-size="88"
        font-weight="900"
        fill="white"
        opacity="1">C</text>

  <!-- Small offset C (overlapping) -->
  <text x="72" y="140"
        font-family="'Arial Rounded MT Bold', 'Arial Black', sans-serif"
        font-size="72"
        font-weight="900"
        fill="rgba(200,190,255,0.55)">C</text>

  <!-- Checkmark -->
  <polyline points="112,152 124,167 148,140"
            fill="none"
            stroke="white"
            stroke-width="9"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
