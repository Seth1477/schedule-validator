<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 116" width="600" height="116">
  <defs>
    <radialGradient id="hg2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6b5fd4"/>
      <stop offset="100%" stop-color="#3d2fa3"/>
    </radialGradient>
    <clipPath id="hc2">
      <polygon points="58,3 106,27 106,87 58,111 10,87 10,27"/>
    </clipPath>
  </defs>

  <!-- ── Hexagon body ── -->
  <polygon points="58,3 106,27 106,87 58,111 10,87 10,27" fill="url(#hg2)"/>
  <!-- Dashed border -->
  <polygon points="58,3 106,27 106,87 58,111 10,87 10,27"
           fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="2.2" stroke-dasharray="6 4"/>

  <!-- Speed lines clipped to hex -->
  <g clip-path="url(#hc2)" opacity="0.30">
    <rect x="62" y="29" width="38" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="62" y="43" width="30" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="62" y="57" width="35" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="62" y="71" width="24" height="6" rx="3" fill="#c4b5fd"/>
  </g>

  <!-- Large C -->
  <text x="14" y="82"
        font-family="'Arial Black','Arial Rounded MT Bold','Arial',sans-serif"
        font-size="66" font-weight="900" fill="white">C</text>

  <!-- Small offset C -->
  <text x="42" y="98"
        font-family="'Arial Black','Arial Rounded MT Bold','Arial',sans-serif"
        font-size="52" font-weight="900" fill="rgba(196,181,253,0.48)">C</text>

  <!-- Checkmark -->
  <polyline points="64,90 73,102 93,78"
            fill="none" stroke="white" stroke-width="6.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark: ConstructCheck as one flow ── -->
  <text y="72"
        font-family="'Inter','Helvetica Neue','Arial',sans-serif"
        font-size="54" font-weight="800" letter-spacing="-1.5">
    <tspan x="124" fill="#1e1b4b">Construct</tspan><tspan fill="#5b4ec4">Check</tspan>
  </text>

  <!-- Tagline -->
  <text x="126" y="95"
        font-family="'Inter','Helvetica Neue','Arial',sans-serif"
        font-size="13" font-weight="700" fill="#7c6fe0"
        letter-spacing="3.8">P6 SCHEDULE INSIGHTS</text>

  <!-- Underline -->
  <line x1="126" y1="100" x2="594" y2="100"
        stroke="#c4b5fd" stroke-width="1" opacity="0.45"/>
</svg>
