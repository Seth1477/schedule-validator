<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <radialGradient id="hg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6b5fd4"/>
      <stop offset="100%" stop-color="#3d2fa3"/>
    </radialGradient>
    <clipPath id="hc">
      <polygon points="60,4 108,28 108,88 60,112 12,88 12,28"/>
    </clipPath>
  </defs>

  <!-- Hexagon -->
  <polygon points="60,4 108,28 108,88 60,112 12,88 12,28" fill="url(#hg)"/>
  <polygon points="60,4 108,28 108,88 60,112 12,88 12,28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Speed lines -->
  <g clip-path="url(#hc)" opacity="0.32">
    <rect x="64" y="30" width="36" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="64" y="44" width="30" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="64" y="58" width="34" height="6" rx="3" fill="#c4b5fd"/>
    <rect x="64" y="72" width="26" height="6" rx="3" fill="#c4b5fd"/>
  </g>

  <!-- Large C -->
  <text x="18" y="82" font-family="'Arial Black','Arial',sans-serif" font-size="62" font-weight="900" fill="white">C</text>
  <!-- Small offset C -->
  <text x="44" y="98" font-family="'Arial Black','Arial',sans-serif" font-size="50" font-weight="900" fill="rgba(200,188,255,0.52)">C</text>
  <!-- Checkmark -->
  <polyline points="66,90 74,100 90,80" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: Construct -->
  <text x="128" y="74" font-family="'Inter','Arial',sans-serif" font-size="52" font-weight="800" fill="#1e1b4b" letter-spacing="-1">Construct</text>
  <!-- Wordmark: Check -->
  <text x="128" y="74" font-family="'Inter','Arial',sans-serif" font-size="52" font-weight="800" fill="#5b4ec4" letter-spacing="-1" dx="316">Check</text>

  <!-- Tagline -->
  <text x="130" y="96" font-family="'Inter','Arial',sans-serif" font-size="13.5" font-weight="700" fill="#7c6fe0" letter-spacing="3.5">P6 SCHEDULE INSIGHTS</text>
  <!-- Divider line under tagline -->
  <line x1="130" y1="101" x2="510" y2="101" stroke="#c4b5fd" stroke-width="1.2" opacity="0.5"/>
</svg>
