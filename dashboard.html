<!DOCTYPE html>
<html lang="en">

      </a>

      <a href="project.html">

        Diagnostics
      </a>
      <a href="comparison.html">

        Comparison
      </a>
      <a href="learn.html">

        Learn
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatarInitial">–</div>
        <div class="user-info">
          <div class="user-name" data-auth-name>Loading…</div>
          <div class="user-role" data-auth-plan>Free</div>
        </div>
        <button class="sidebar-logout-btn" onclick="CC.Auth.logout()" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Projects</h1>
        <p class="page-subtitle">Manage construction schedule analytics across all active projects</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" title="Restore all project data from a backup file" onclick="App.whenReady().then(()=>App.openImportPicker())">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Restore Backup
        </button>
        <button class="btn btn-secondary" title="Download a JSON backup of all your project data" onclick="App.whenReady().then(()=>App.exportAccountData())">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Export Backup
        </button>
        <button class="btn btn-secondary" onclick="document.querySelector('#newProjectModal').style.display='flex'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Project
        </button>
        <a href="upload.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Schedule
        </a>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="stats-row">
      <div class="stat-card card">
        <div class="stat-icon stat-icon-blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="stat-active">0</div>
          <div class="stat-label">Active Projects</div>
        </div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon stat-icon-green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="stat-green">0</div>
          <div class="stat-label">Green (≥85)</div>
        </div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon stat-icon-amber">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="stat-amber">0</div>
          <div class="stat-label">Amber (70–84)</div>
        </div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon stat-icon-red">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="stat-red">0</div>
          <div class="stat-label">Red (&lt;70)</div>
        </div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon stat-icon-blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="stat-uploads">0</div>
          <div class="stat-label">Total Uploads</div>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar card">
      <div class="filter-group">
        <input type="text" class="form-input search-input" placeholder="🔍  Search projects..." id="projectSearch" oninput="filterProjects()" />
      </div>
      <div class="filter-group">
        <select class="form-select" id="statusFilter" onchange="filterProjects()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <div class="filter-group">
        <select class="form-select" id="ragFilter" onchange="filterProjects()">
          <option value="">All Scores</option>
          <option value="green">Green (≥85)</option>
          <option value="amber">Amber (70–84)</option>
          <option value="red">Red (&lt;70)</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="btn btn-secondary btn-sm" onclick="setView('grid')" id="gridViewBtn">⊞ Grid</button>
        <button class="btn btn-secondary btn-sm" onclick="setView('list')" id="listViewBtn">☰ List</button>
      </div>
    </div>

    <!-- Projects Grid -->
    <div id="projectsGrid" class="projects-grid"></div>

<!-- New Project Modal -->
<div id="newProjectModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2>Create New Project</h2>
      <button class="modal-close" onclick="document.querySelector('#newProjectModal').style.display='none'">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Project Name *</label>
        <input type="text" class="form-input" id="newProjName" placeholder="e.g. Downtown Medical Center Tower" />
      </div>
      <div class="form-group">
        <label class="form-label">Client / Owner</label>
        <input type="text" class="form-input" id="newProjClient" placeholder="e.g. HealthCorp Development LLC" />
      </div>
      <div class="grid-2 gap-4">
        <div class="form-group">
          <label class="form-label">Contract Value</label>
          <input type="text" class="form-input" id="newProjValue" placeholder="$0" />
        </div>
        <div class="form-group">
          <label class="form-label">Contract Type</label>
          <select class="form-select" id="newProjType">
            <option>GMP</option><option>DBB</option><option>CM at Risk</option><option>Design-Build</option><option>IDIQ</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" class="form-input" id="newProjLocation" placeholder="City, State" />
      </div>
      <div class="grid-2 gap-4">
        <div class="form-group">
          <label class="form-label">Planned Start</label>
          <input type="date" class="form-input" id="newProjStart" />
        </div>
        <div class="form-group">
          <label class="form-label">Planned Finish</label>
          <input type="date" class="form-input" id="newProjFinish" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="newProjDesc" rows="3" placeholder="Brief project description..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.querySelector('#newProjectModal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create Project</button>
    </div>
  </div>

<script src="js/learn-data.js"></script>
<script src="js/info-modal.js"></script>
<script src="js/demo-data.js"></script>

<script>
function filterProjects() {
  const search = document.getElementById('projectSearch').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const rag = document.getElementById('ragFilter').value;

  document.querySelectorAll('.project-card').forEach(card => {
    const name = card.querySelector('.project-name')?.textContent.toLowerCase() || '';
    const client = card.querySelector('.project-client')?.textContent.toLowerCase() || '';
    const ragClass = card.dataset.rag || '';
    const cardStatus = card.dataset.status || '';

    let show = true;
    if (search && !name.includes(search) && !client.includes(search)) show = false;
    if (status && cardStatus !== status) show = false;
    if (rag && ragClass !== rag) show = false;
    card.style.display = show ? '' : 'none';
  });
}

function setView(mode) {
  const grid = document.getElementById('projectsGrid');
  if (mode === 'list') {
    grid.classList.remove('projects-grid');
    grid.classList.add('projects-list');
    document.getElementById('listViewBtn').classList.add('btn-primary');
    document.getElementById('listViewBtn').classList.remove('btn-secondary');
    document.getElementById('gridViewBtn').classList.add('btn-secondary');
    document.getElementById('gridViewBtn').classList.remove('btn-primary');
  } else {
    grid.classList.add('projects-grid');
    grid.classList.remove('projects-list');
    document.getElementById('gridViewBtn').classList.add('btn-primary');
    document.getElementById('gridViewBtn').classList.remove('btn-secondary');
    document.getElementById('listViewBtn').classList.add('btn-secondary');
    document.getElementById('listViewBtn').classList.remove('btn-primary');
  }
}

function createProject() {
  const name = document.getElementById('newProjName').value.trim();
  if (!name) { App.showAlert('Project name is required.', 'error'); return; }

  const proj = {
    id: 'proj-' + Date.now(),
    name,
    client: document.getElementById('newProjClient').value || 'Unknown Client',
    contractValue: document.getElementById('newProjValue').value || 'TBD',
    contractType: document.getElementById('newProjType').value,
    location: document.getElementById('newProjLocation').value || 'TBD',
    startDate: document.getElementById('newProjStart').value || '',
    plannedFinish: document.getElementById('newProjFinish').value || '',
    description: document.getElementById('newProjDesc').value || '',
    status: 'active',
    tags: [],
    uploads: 0,
    latestScore: null,
    latestScoreRag: null,
    createdAt: new Date().toISOString().split('T')[0],
    updatedAt: new Date().toISOString().split('T')[0]
  };

  App.projects.push(proj);
  App.saveToStorage();
  App.renderProjectsList();
  document.querySelector('#newProjectModal').style.display = 'none';
  App.showAlert(`Project "${name}" created. Upload a schedule to get started.`, 'success');
}
</script>
<script>
// Auth guard + user state
(function(){
  const user = CC.Auth.currentUser();
  if(!user){
    window.location.href='login.html?redirect='+encodeURIComponent(window.location.pathname);
    return;
  }
  CC.Auth.renderUserState();

  // Show first-login tutorial after a short delay
  // v2 key — clears old dismissed state so fixed tutorial shows once more
  const tutorialKey = 'cc_tutorial_seen_v3_' + user.email;
  if (!localStorage.getItem(tutorialKey)) {
    setTimeout(() => showTutorial(), 800);
  }
})();

/* ── First-login Tutorial ─────────────────────────────────── */
function showTutorial() {
  const user = CC.Auth.currentUser();
  if (user) localStorage.setItem('cc_tutorial_seen_v3_' + user.email, '1');

  // Inject keyframe styles
  const style = document.createElement('style');
  style.textContent = `
    @keyframes tutPulse {
      0%,100% { transform:scale(1);   opacity:.7; }
      50%      { transform:scale(1.07); opacity:.25; }
    }
  `;
  document.head.appendChild(style);

  /*
   * KEY FIX: No separate backdrop div.
   * The spotlight uses box-shadow with a 9999px spread to darken everything
   * OUTSIDE the spotlight — the area inside the spotlight remains fully
   * visible and interactive. pointer-events:none lets clicks pass through.
   */
  const overlay = document.createElement('div');
  overlay.id = 'cc-tutorial';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:8000;pointer-events:none;';

  overlay.innerHTML = `
    <!-- Spotlight: box-shadow creates dark surround; element itself is clear -->
    <div id="tut-spotlight" style="
      position:fixed;border-radius:12px;
      box-shadow:0 0 0 5px #a593f5, 0 0 0 9999px rgba(13,11,30,0.78);
      pointer-events:none;
      transition:top .35s ease,left .35s ease,width .35s ease,height .35s ease;
      z-index:8001;
    "></div>

    <!-- Pulse ring (decorative, sits behind spotlight) -->
    <div id="tut-pulse" style="
      position:fixed;border-radius:14px;
      border:3px solid rgba(165,147,245,0.55);
      pointer-events:none;z-index:8000;
      animation:tutPulse 1.5s ease-in-out infinite;
    "></div>

    <!-- Tooltip card — pointer-events:all so buttons are clickable -->
    <div id="tut-tooltip" style="
      position:fixed;background:#fff;border-radius:16px;
      padding:24px 28px 20px;width:300px;
      box-shadow:0 20px 60px rgba(0,0,0,0.28);
      z-index:8003;pointer-events:all;
      transition:top .35s ease,left .35s ease;
    ">
      <button onclick="closeTutorial()" style="
        position:absolute;top:12px;right:12px;background:none;border:none;
        cursor:pointer;color:#94a3b8;font-size:20px;line-height:1;padding:2px 6px;
      ">×</button>

      <div id="tut-steps" style="display:flex;gap:6px;margin-bottom:16px;"></div>

      <div id="tut-icon" style="font-size:34px;margin-bottom:10px;"></div>
      <h3 id="tut-title" style="font-size:17px;font-weight:700;color:#1e1b4b;margin-bottom:8px;"></h3>
      <p id="tut-body" style="font-size:14px;color:#64748b;line-height:1.65;margin-bottom:22px;"></p>

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <button onclick="closeTutorial()" style="
          background:none;border:none;cursor:pointer;font-size:13px;color:#94a3b8;
        ">Skip tutorial</button>
        <button id="tut-next-btn" onclick="tutorialNext()" style="
          background:#7c6fe0;color:#fff;border:none;border-radius:9px;
          padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;
          box-shadow:0 4px 14px rgba(124,111,224,.35);
        "></button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  window._tutStep = 0;
  positionTutorial();
}

const TUT_STEPS = [
  {
    target: () => document.querySelector('a[href="upload.html"].btn-primary, a[href="upload.html"].btn'),
    icon: '⬆️',
    title: 'Upload a Schedule',
    body: 'Click <strong>Upload Schedule</strong> to import a Primavera P6 XER file. This is where everything starts.',
    position: 'below',
  },
  {
    target: () => document.querySelector('.stats-row'),
    icon: '📊',
    title: 'Get your DCMA+ Score',
    body: 'After uploading, you\'ll instantly see a <strong>DCMA+ quality score</strong> across 6 categories — logic, critical path, constraints, and more.',
    position: 'below',
  },
  {
    target: () => document.querySelector('a[href="learn.html"]'),
    icon: '🎓',
    title: 'Learning Centre',
    body: 'Not sure what a metric means? The <strong>Learning Centre</strong> explains every score, diagnostic, and threshold — great for your whole team.',
    position: 'right',
  },
];

function positionTutorial() {
  const step     = TUT_STEPS[window._tutStep];
  const el       = step.target();
  const tooltip  = document.getElementById('tut-tooltip');
  const spotlight= document.getElementById('tut-spotlight');
  const pulse    = document.getElementById('tut-pulse');
  const isLast   = window._tutStep === TUT_STEPS.length - 1;

  // Rebuild step dots
  const dotsEl = document.getElementById('tut-steps');
  dotsEl.innerHTML = TUT_STEPS.map((_, i) =>
    `<div style="width:8px;height:8px;border-radius:50%;background:${i===window._tutStep?'#7c6fe0':'#e2e8f0'};transition:background .3s;"></div>`
  ).join('');

  // Update tooltip content
  document.getElementById('tut-icon').textContent  = step.icon;
  document.getElementById('tut-title').textContent = step.title;
  document.getElementById('tut-body').innerHTML    = step.body;
  document.getElementById('tut-next-btn').textContent = isLast ? 'Got it! 🎉' : 'Next →';

  if (!el) { closeTutorial(); return; }

  // Scroll element into view if needed
  el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Give scroll a moment then position
  requestAnimationFrame(() => {
    const r   = el.getBoundingClientRect();
    const pad = 12;

    // ── Spotlight ──────────────────────────────────────────────
    // The box-shadow spread darkens OUTSIDE this rect — nothing
    // inside is blurred or covered, so the element remains clear.
    spotlight.style.top    = (r.top  - pad) + 'px';
    spotlight.style.left   = (r.left - pad) + 'px';
    spotlight.style.width  = (r.width  + pad * 2) + 'px';
    spotlight.style.height = (r.height + pad * 2) + 'px';

    // ── Pulse ring (slightly larger than spotlight) ─────────────
    pulse.style.top    = (r.top  - pad - 5) + 'px';
    pulse.style.left   = (r.left - pad - 5) + 'px';
    pulse.style.width  = (r.width  + pad * 2 + 10) + 'px';
    pulse.style.height = (r.height + pad * 2 + 10) + 'px';

    // ── Tooltip placement ───────────────────────────────────────
    const tw = 300;
    // Estimate tooltip height based on content
    const th = isLast ? 210 : 240;
    let tTop, tLeft;

    if (step.position === 'right') {
      tTop  = r.top + r.height / 2 - th / 2;
      tLeft = r.right + 20;
    } else if (r.bottom + th + 20 < window.innerHeight) {
      // Below spotlight
      tTop  = r.bottom + pad + 16;
      tLeft = r.left + r.width / 2 - tw / 2;
    } else {
      // Above spotlight
      tTop  = r.top - pad - th - 16;
      tLeft = r.left + r.width / 2 - tw / 2;
    }

    tLeft = Math.max(12, Math.min(tLeft, window.innerWidth  - tw - 12));
    tTop  = Math.max(12, Math.min(tTop,  window.innerHeight - th - 12));

    tooltip.style.top  = tTop  + 'px';
    tooltip.style.left = tLeft + 'px';
  });
}

function tutorialNext() {
  window._tutStep++;
  if (window._tutStep >= TUT_STEPS.length) { closeTutorial(); return; }
  positionTutorial();
}

function closeTutorial() {
  const el = document.getElementById('cc-tutorial');
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }
}
</script>
